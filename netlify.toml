[build]
  command = "npm run build"
  publish = ".next"

# Redirects for Next.js App Router
[[redirects]]
  from = "/products/*"
  to = "/products/:splat"
  status = 200

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
